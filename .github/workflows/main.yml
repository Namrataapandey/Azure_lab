name: Deploy to Azure VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      RG: demo-production-rg
      VM: intern-vm
      LOCATION: southeastasia
      ADMIN: azureuser

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision infrastructure
        run: |
          set -e
          az config set core.only_show_errors=true
          az group create --name $RG --location $LOCATION --output none

          if ! az vm show -g $RG -n $VM &>/dev/null; then
            echo "=== Creating VM ==="
            az vm create -g $RG -n $VM \
              --image Ubuntu2204 \
              --size Standard_D2s_v3 \
              --admin-username $ADMIN \
              --generate-ssh-keys \
              --output none
            az vm open-port -g $RG -n $VM --port 80 --priority 300 --output none
          else
            STATE=$(az vm show -g $RG -n $VM -d --query powerState -o tsv)
            echo "VM state: $STATE"
            if [ "$STATE" != "VM running" ]; then
              echo "=== Starting VM ==="
              az vm start -g $RG -n $VM --output none
              echo "VM started"
            fi
          fi

          echo "=== Waiting for VM agent ==="
          for i in $(seq 1 30); do
            az vm run-command invoke -g $RG -n $VM \
              --command-id RunShellScript \
              --scripts "echo ready" &>/dev/null && break
            sleep 10
          done
          echo "VM agent ready"

      - name: Get VM IP
        run: |
          echo "VM_IP=$(az vm show -g $RG -n $VM -d --query publicIps -o tsv)" >> $GITHUB_ENV

      - name: Setup Apache
        run: |
          set -e
          az vm run-command invoke -g $RG -n $VM \
            --command-id RunShellScript \
            --scripts "
              set -e
              if ! dpkg -s apache2 2>/dev/null | grep -q 'Status: install ok installed'; then
                apt-get update -qq && apt-get install -y -qq apache2
              fi
              systemctl start apache2
              systemctl enable apache2
            "

      - name: Deploy Website
        run: |
          # List files to debug
          echo "=== Files in repository ==="
          ls -la

          # Deploy to VM
          az vm run-command invoke -g $RG -n $VM \
            --command-id RunShellScript \
            --scripts "
              cd /var/www/html
              sudo rm -rf index.html style.css script.js
              
              # Download files from GitHub using raw URLs
              sudo curl -O https://raw.githubusercontent.com/Namrataapandey/Azure_lab/main/index.html
              sudo curl -O https://raw.githubusercontent.com/Namrataapandey/Azure_lab/main/style.css
              sudo curl -O https://raw.githubusercontent.com/Namrataapandey/Azure_lab/main/script.js
              
              # Set permissions
              sudo chown -R www-data:www-data /var/www/html
              sudo systemctl reload apache2
              
              # Verify files are there
              ls -la /var/www/html/
            "

      - name: Verify deployment
        run: |
          sleep 3
          echo "=== Verifying deployment ==="
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "http://$VM_IP/")
          echo "HTTP Status: $RESPONSE"

          if [ "$RESPONSE" != "200" ]; then
            echo "Deployment verification failed"
            exit 1
          fi

          # Get page title to confirm it's your site
          TITLE=$(curl -s "http://$VM_IP/" | grep -o '<title>.*</title>' | head -1)
          echo "Page Title: $TITLE"
          echo "Deployment verified — site is live on http://$VM_IP/"
