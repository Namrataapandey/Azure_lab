name: Deploy to Azure VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Test Azure Connection
        run: |
          echo "Testing Azure connection..."
          az account show
          az group list -o table

      - name: Get VM IP
        run: |
          echo "VM_IP=$(az vm show -g demo-production-rg -n intern-vm -d --query publicIps -o tsv)" >> $GITHUB_ENV
          echo "VM IP: $VM_IP"

      - name: Deploy Website
        run: |
          echo "=== Deploying to VM ==="
          az vm run-command invoke -g demo-production-rg -n intern-vm \
            --command-id RunShellScript \
            --scripts "
              cd /var/www/html
              sudo rm -rf index.html style.css script.js assets
              sudo git clone https://github.com/Namrataapandey/Azure_lab.git temp
              sudo cp -r temp/* . 2>/dev/null
              sudo rm -rf temp
              sudo chown -R www-data:www-data /var/www/html
              sudo systemctl reload apache2
              ls -la /var/www/html/
            "

      - name: Verify Deployment
        run: |
          sleep 3
          echo "=== Verifying ==="
          curl -s -o /dev/null -w "%{http_code}" "http://$VM_IP/"
          echo ""
          echo "✅ Site: http://$VM_IP/"
