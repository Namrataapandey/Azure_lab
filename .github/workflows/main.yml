name: Deploy to Azure VM (No Node.js)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Use Azure CLI directly without Node.js
      - name: Azure Login
        run: |
          echo '${{ secrets.AZURE_CREDENTIALS }}' | az login --service-principal -u $(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientId) -p $(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientSecret) --tenant $(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .tenantId)

      - name: Deploy to VM
        run: |
          az vm run-command invoke -g demo-production-rg -n intern-vm \
            --command-id RunShellScript \
            --scripts "
              cd /var/www/html
              sudo rm -rf index.html style.css script.js assets .git
              sudo git clone https://github.com/Namrataapandey/Azure_lab.git temp
              sudo cp -r temp/* temp/.* . 2>/dev/null || true
              sudo rm -rf temp
              sudo chown -R www-data:www-data /var/www/html
              sudo systemctl reload apache2
            "

      - name: Verify
        run: |
          IP=$(az vm show -d -g demo-production-rg -n intern-vm --query publicIps -o tsv)
          echo "Site: http://$IP/"
          curl -s -o /dev/null -w "%{http_code}" "http://$IP/"